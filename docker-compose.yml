# Main Compose for combination of Interaction- and Orchestration Platfrom

services:
  interaction-platform:
    build: ./src/starter
    image: homeserver:5000/llm-orchestration/starter:latest
    depends_on:
      - orchestration-platform

  orchestration-platform:
    build: ./src/scheduler
    image: homeserver:5000/llm-orchestration/scheduler:latest
    group_add:
      - "987"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./hostData:/hostData
    environment: 
      - HOST_PWD=${PWD}
