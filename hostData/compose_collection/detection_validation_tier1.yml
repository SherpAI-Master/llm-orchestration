# Detecting validation values
services:

  codebase:
    build: ./images/detection/validation/tier1/codebase
    container_name: codebase-detection-validation
    image: homeserver:5000/llm-orchestration/detection_validation_tier1_codebase:latest
    volumes:
      - ${INPUT}:/job/input.jsonl
      - ${OUTPUT}:/job/output.jsonl
