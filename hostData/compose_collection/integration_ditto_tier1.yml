# Integration: Match pairs with ditto
services:

  codebase:
    build: ./images/integration/ditto/tier1/codebase
    container_name: codebase
    image: homeserver:5000/llm-orchestration/integration_ditto_tier1_codebase:latest
    volumes:
      - ${INPUT}:/job/input.jsonl
      - ${OUTPUT}:/job/output.jsonl
      - /home/roman/code/llm-orchestration/ft_models/ditto:/job/model