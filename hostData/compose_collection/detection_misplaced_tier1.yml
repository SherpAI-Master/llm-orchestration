# Detecting Incomplete values
services:

  codebase:
    build: ./images/detection/misplaced/tier1/codebase
    image: homeserver:5000/llm-orchestration/detection_misplaced_tier1_codebase:latest
    container_name: codebase-detection-misplaced
    networks:
      - llm-net
    volumes:
      - ${INPUT}:/job/input.jsonl
      - ${OUTPUT}:/job/output.jsonl

networks:
  llm-net:
    external: true