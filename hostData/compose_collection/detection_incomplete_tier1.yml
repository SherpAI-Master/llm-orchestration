# Detecting Incomplete values
services:

  codebase:
    build: ./images/detection/incomplete/tier1/codebase
    container_name: codebase-detection-incomplete
    image: homeserver:5000/llm-orchestration/detection_incomplete_tier1_codebase:latest
    volumes:
      - ${INPUT}:/job/input.jsonl
      - ${OUTPUT}:/job/output.jsonl
