# Detecting misspelled values
services:

  codebase:
    build: ./images/detection/misspelled/tier1/codebase
    container_name: codebase
    networks:
      - llm-net
    image: homeserver:5000/llm-orchestration/detection_misspelled_tier1_codebase:latest
    volumes:
      - ${INPUT}:/job/input.jsonl
      - ${OUTPUT}:/job/output.jsonl


networks:
  llm-net:
    external: true
