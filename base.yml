# Base stack: GPU-heavy LLM services that stay up permanently

networks:
  llm-net:
    external: true
    name: llm-net        # fixed name so the app stack can join it

services:

  knowledgebase:
    image: vllm/vllm-openai:latest
    container_name: knowledgebase
    networks:
      - llm-net
    restart: unless-stopped
    ports:
      - "8090:8000"
    volumes:
      - /opt/sherpai/huggingface:/root/.cache/huggingface
      - /opt/sherpai/llm-orchestration/ft_models/adapter:/app/adapters
    environment:
      - HF_TOKEN=${HF_TOKEN}
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      --model unsloth/gemma-3-27b-it-bnb-4bit
      --max-model-len 2048
      --gpu-memory-utilization 0.90
      --trust-remote-code
      --enable-lora
      --lora-modules
        fix_misplaced_gemma=/app/adapters/fix_misplaced_gemma
        detect_misplaced_gemma=/app/adapters/detect_misplaced_gemma
      --enforce-eager
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  embedbase:
    image: vllm/vllm-openai:latest
    container_name: embedbase
    networks:
      - llm-net
    restart: unless-stopped
    ports:
      - "8095:8000"
    volumes:
      - /opt/sherpai/huggingface:/root/.cache/huggingface
      - /opt/sherpai/llm-orchestration/ft_models/adapter:/app/adapters
    environment:
      - HF_TOKEN=${HF_TOKEN}
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      --model sentence-transformers/all-MiniLM-L6-v2
      --max-model-len 256
      --gpu-memory-utilization 0.05
      --trust-remote-code