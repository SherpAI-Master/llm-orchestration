server {
    listen 80;
    server_name localhost;

    # Serve static frontend files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Crucial for SPA client-side routing (React Router / Vue Router)
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to your backend service
    location /api/ {
        # Using docker-compose service name and internal Uvicorn port
        proxy_pass http://orchestration-platform:8090/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}